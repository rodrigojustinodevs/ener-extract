services:
  mysql:
    image: mysql:8.0
    container_name: ener-extract-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-ener_extract}
      MYSQL_USER: ${MYSQL_USER:-app}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-app}
    ports:
      - "${MYSQL_PORT:-3309}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "sh", "-c", "mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ener-extract-app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: mysql://${MYSQL_USER:-app}:${MYSQL_PASSWORD:-app}@mysql:3306/${MYSQL_DATABASE:-ener_extract}
      PORT: 3001
    ports:
      - "${APP_PORT:-3001}:3001"
    # Descomente para desenvolvimento com volume (hot-reload não nativo no CMD atual)
    # volumes:
    #   - .:/app
    #   - /app/node_modules

volumes:
  mysql_data:
